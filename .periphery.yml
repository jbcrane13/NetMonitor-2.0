# Periphery configuration for NetMonitor-2.0
# Dead code scanner — https://github.com/peripheryapp/periphery
#
# Run: periphery scan
# CI:  periphery scan --format github-actions (warning annotations only)

project: NetMonitor-2.0.xcodeproj
schemes:
  - NetMonitor-macOS
  - NetMonitor-iOS

# Output format for local runs; CI overrides with --format github-actions
format: xcode

# ───────────────────────────────────────────
# Retention — what Periphery must NOT flag as unused
# ───────────────────────────────────────────

# Retain all public declarations (shared Swift packages expose public APIs)
retain_public: true

# SwiftUI @main entry points and View bodies are implicitly used
retain_swift_ui_previews: true

# SwiftData / Codable models — properties are accessed at runtime via reflection
retain_codable_properties: true
retain_assign_only_properties: true

# Obj-C interop retained by the runtime
retain_objc_annotated: true

# ───────────────────────────────────────────
# Exclusions — paths that generate false positives
# ───────────────────────────────────────────

index_exclude:
  - build
  - .build
  - .worktrees
  - "**/*.generated.swift"

report_exclude:
  - "**/*Tests*"        # Test helpers, mocks, and fixtures look "unused" by design
  - "**/Preview*"       # SwiftUI preview providers
  - "**/TestFixtures*"
