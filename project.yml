name: NetMonitor-2.0
options:
  bundleIdPrefix: com
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  NetMonitorCore:
    path: Packages/NetMonitorCore
  NetworkScanKit:
    path: Packages/NetworkScanKit

targets:
  NetMonitor-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: NetMonitor-macOS
        includes:
          - "**/*.swift"
      - path: NetMonitor-macOS/Resources/Assets.xcassets
    info:
      path: NetMonitor-macOS/Resources/Info.plist
      properties:
        CFBundleName: NetMonitor Pro
        CFBundleDisplayName: NetMonitor Pro
        CFBundleShortVersionString: "2.0"
        CFBundleVersion: "15"
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: NetMonitor-macOS/Resources/NetMonitor-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netmonitor.NetMonitor
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: NetMonitor-macOS/Resources/NetMonitor-macOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: NetMonitorCore
      - package: NetworkScanKit

  NetMonitor-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NetMonitor-iOS
        includes:
          - "**/*.swift"
        excludes:
          - "Widget/**"
      - path: NetMonitor-iOS/Resources/Assets.xcassets
    info:
      path: NetMonitor-iOS/Resources/Info.plist
      properties:
        CFBundleName: Netmonitor
        CFBundleDisplayName: Netmonitor
        CFBundleShortVersionString: "2.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        NSLocationWhenInUseUsageDescription: "NetMonitor uses your location to display WiFi network information and monitor GeoFence zones."
        NSLocationAlwaysAndWhenInUseUsageDescription: "NetMonitor uses your location in the background to trigger GeoFence alerts when you enter or exit defined zones."
        NSAppTransportSecurity:
          NSExceptionDomains:
            ip-api.com:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakemiller.netmonitor
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: NetMonitorCore
      - package: NetworkScanKit

  NetMonitor-macOSTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/NetMonitor-macOSTests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-macOS

  NetMonitor-iOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/NetMonitor-iOSTests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-iOS
      - package: NetMonitorCore
      - package: NetworkScanKit

  NetMonitor-macOSUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/NetMonitor-macOSUITests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-macOS

  NetMonitor-iOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/NetMonitor-iOSUITests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-iOS
