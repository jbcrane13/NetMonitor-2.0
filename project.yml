name: NetMonitor-2.0
options:
  bundleIdPrefix: com
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  NetMonitorCore:
    path: Packages/NetMonitorCore
  NetworkScanKit:
    path: Packages/NetworkScanKit

targets:
  NetMonitor-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: NetMonitor-macOS
        includes:
          - "**/*.swift"
          - "Views/Components/FlowLayout.swift"
          - "Views/Devices/ProDeviceDetailView.swift"
      - path: NetMonitor-macOS/Resources/Assets.xcassets
    info:
      path: NetMonitor-macOS/Resources/Info.plist
      properties:
        CFBundleName: NetMonitor Pro
        CFBundleDisplayName: NetMonitor Pro
        CFBundleShortVersionString: "2.1.1"
        CFBundleVersion: "29"
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "Copyright © 2026 Blake Crane. All rights reserved."
        NSLocalNetworkUsageDescription: "NetMonitor Pro scans your local network to discover devices, services, and the iOS companion app."
        NSLocationUsageDescription: "NetMonitor Pro uses your location to scan for nearby Wi-Fi access points in the heatmap tool."
        NSBonjourServices:
          - _netmon._tcp
          - _http._tcp
          - _https._tcp
          - _smb._tcp
          - _ssh._tcp
          - _airplay._tcp
          - _raop._tcp
          - _afpovertcp._tcp
          - _printer._tcp
          - _ipp._tcp
          - _homekit._tcp
          - _hap._tcp
          - _companion-link._tcp
          - _apple-mobdev2._tcp
          - _device-info._tcp
          - _googlecast._tcp
          - _spotify-connect._tcp
          - _sonos._tcp
          - _workstation._tcp
        NSAppTransportSecurity:
          NSExceptionDomains:
            ip-api.com:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.netmonitor.survey
            UTTypeDescription: NetMonitor Survey Project
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - netmonsurvey
          - UTTypeIdentifier: com.netmonitor.blueprint
            UTTypeDescription: NetMonitor Blueprint
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - netmonblueprint
        CFBundleDocumentTypes:
          - CFBundleTypeName: NetMonitor Survey Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.netmonitor.survey
          - CFBundleTypeName: NetMonitor Blueprint
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.netmonitor.blueprint
    entitlements:
      path: NetMonitor-macOS/Resources/NetMonitor-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netmonitor.NetMonitor
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: NetMonitor-macOS/Resources/NetMonitor-macOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet --reporter xcode
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    dependencies:
      - package: NetMonitorCore
      - package: NetworkScanKit

  NetMonitor-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    scheme:
      testTargets:
        - NetMonitor-iOSTests
        - NetMonitor-iOSUITests
    sources:
      - path: NetMonitor-iOS
        includes:
          - "**/*.swift"
        excludes:
          - "Widget/**"
      - path: NetMonitor-iOS/Resources/Assets.xcassets
    entitlements:
      path: NetMonitor-iOS/Resources/NetMonitor-iOS.entitlements
      properties:
        com.apple.developer.networking.wifi-info: true
    info:
      path: NetMonitor-iOS/Resources/Info.plist
      properties:
        CFBundleName: Netmonitor
        CFBundleDisplayName: Netmonitor
        CFBundleShortVersionString: "2.1.1"
        CFBundleVersion: "2"
        CFBundleIconName: AppIcon
        NSCameraUsageDescription: "NetMonitor uses the camera for AR-assisted room scanning to create floor plans for Wi-Fi coverage surveys."
        NSLocationWhenInUseUsageDescription: "NetMonitor uses your location to display WiFi network information and monitor GeoFence zones."
        NSLocationAlwaysAndWhenInUseUsageDescription: "NetMonitor uses your location in the background to trigger GeoFence alerts when you enter or exit defined zones."
        NSBonjourServices:
          - _netmon._tcp
          - _http._tcp
          - _https._tcp
          - _smb._tcp
          - _ssh._tcp
          - _airplay._tcp
          - _raop._tcp
          - _afpovertcp._tcp
          - _printer._tcp
          - _ipp._tcp
          - _homekit._tcp
          - _hap._tcp
          - _companion-link._tcp
          - _apple-mobdev2._tcp
          - _device-info._tcp
          - _googlecast._tcp
          - _spotify-connect._tcp
          - _sonos._tcp
          - _workstation._tcp
        NSLocalNetworkUsageDescription: "NetMonitor scans your local network to discover devices, services, and the macOS companion app."
        NSAppTransportSecurity:
          NSExceptionDomains:
            ip-api.com:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.blakemiller.netmonitor.refresh
          - com.blakemiller.netmonitor.sync
          - com.blakemiller.netmonitor.scheduledNetworkScan
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.netmonitor.survey
            UTTypeDescription: NetMonitor Survey Project
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - netmonsurvey
          - UTTypeIdentifier: com.netmonitor.blueprint
            UTTypeDescription: NetMonitor Blueprint
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - netmonblueprint
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - netmonitor
            CFBundleURLName: com.blakemiller.netmonitor
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: NetMonitor Survey Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.netmonitor.survey
          - CFBundleTypeName: NetMonitor Blueprint
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.netmonitor.blueprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakemiller.netmonitor
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_ENTITLEMENTS: NetMonitor-iOS/Resources/NetMonitor-iOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet --reporter xcode
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    dependencies:
      - package: NetMonitorCore
      - package: NetworkScanKit

  NetMonitor-macOSTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/NetMonitor-macOSTests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-macOS

  NetMonitor-iOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/NetMonitor-iOSTests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-iOS
      - package: NetMonitorCore
      - package: NetworkScanKit

  NetMonitor-macOSUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/NetMonitor-macOSUITests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-macOS

  NetMonitor-iOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/NetMonitor-iOSUITests
    settings:
      base:
        DEVELOPMENT_TEAM: 32XZRDTGK3
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NetMonitor-iOS
