name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Lint gate
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: SwiftLint — must be error-free
        run: swiftlint lint --strict --baseline .swiftlint_baseline.json --reporter github-actions-logging

      - name: SwiftFormat — must be clean
        run: swiftformat --lint .

  build-macos:
    name: Build macOS
    runs-on: macos-15
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS (release)
        run: |
          xcodebuild build \
            -scheme NetMonitor-macOS \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY='-' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  build-ios:
    name: Build iOS
    runs-on: macos-15
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS (release)
        run: |
          xcodebuild build \
            -scheme NetMonitor-iOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY='-' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-ios]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "NetMonitor ${{ github.ref_name }}" \
            --draft
        env:
          GH_TOKEN: ${{ github.token }}
