name: Bug Report
description: Report a bug in NetMonitor
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Note:** This project uses [beads (bd)](https://github.com/beads-org/beads) for issue tracking. If you have access, please also create a `bd` issue so agents can discover and claim the work.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "e.g. 2.0.1 (build 16)"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g. macOS 15.2 or iOS 18.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant Console.app logs or attach screenshots.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (crash, data loss)
        - High (feature broken)
        - Medium (annoying but workaround exists)
        - Low (cosmetic)
    validations:
      required: true
