name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Note:** This project uses [beads (bd)](https://github.com/beads-org/beads) for issue tracking. If you have access, please also create a `bd` issue so agents can discover and claim the work.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS
        - Both
        - Core (shared package)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or enhancement you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority suggestion
      options:
        - High (core workflow improvement)
        - Medium (nice to have)
        - Low (polish)
    validations:
      required: false
